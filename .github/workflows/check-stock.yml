name: Check Amul Stock

on:
  schedule:
    # Offset from :00/:05 to avoid GitHub's peak load drops at the top of each hour.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore stock state cache
        uses: actions/cache@v4
        with:
          path: .stock_state.json
          key: amul-stock-state-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check stock and notify
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python app.py --once
